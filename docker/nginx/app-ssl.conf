# Qo'shimcha: origin Let's Encrypt (docker compose 443 port + cert volume)
# cp docker/nginx/app-ssl.conf → nginx conf.d yoki compose volumes ga qo'shing

server {
    listen 443 ssl http2;
    server_name spinthebottletg.com www.spinthebottletg.com;

    ssl_certificate     /etc/letsencrypt/live/spinthebottletg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spinthebottletg.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    location / {
        proxy_pass http://bot:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
