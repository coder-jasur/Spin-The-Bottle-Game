# spinthebottletg.com — :80 (Cloudflare SSL yoki reverse proxy orqali HTTPS)
# Origin SSL kerak bo'lsa: docker/nginx/app-ssl.conf ni conf.d ga qo'shing + compose 443

limit_req_zone $binary_remote_addr zone=spb_general:10m rate=25r/s;
limit_req_zone $binary_remote_addr zone=spb_auth:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=spb_conn:10m;

upstream spinthebottle_app {
    server bot:8000;
}

server {
    listen 80 default_server;
    server_name spinthebottletg.com www.spinthebottletg.com;

    client_max_body_size 32m;
    limit_conn spb_conn 60;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/auth/ {
        limit_req zone=spb_auth burst=15 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        limit_req zone=spb_general burst=80 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
