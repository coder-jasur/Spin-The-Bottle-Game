# spinthebottletg.com — Let's Encrypt + Docker nginx
# Sertifikat: /etc/letsencrypt/live/spinthebottletg.com/
# HTTP → HTTPS redirect; HTTPS → bot:8000

limit_req_zone $binary_remote_addr zone=spb_general:10m rate=80r/s;
limit_req_status 429;
limit_req_zone $binary_remote_addr zone=spb_auth:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=spb_conn:10m;

upstream spinthebottle_app {
    server bot:8000;
}

# ── HTTP: ACME + HTTPS ga yo'naltirish ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name spinthebottletg.com www.spinthebottletg.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Let's Encrypt ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name spinthebottletg.com www.spinthebottletg.com;

    ssl_certificate     /etc/letsencrypt/live/spinthebottletg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spinthebottletg.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 32m;
    limit_conn spb_conn 60;

    location /api/auth/ {
        limit_req zone=spb_auth burst=15 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    # O'yin rasmlari — nginx diskdan (503 limitdan qochish)
    location ~* ^/(dlg[0-9]+|[0-9]{2,3})/ {
        root /var/www/bottle/bundle;
        try_files $uri @spb_app;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /bottle/bundle/ {
        root /var/www;
        try_files $uri @spb_app;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /sfx/ {
        alias /var/www/bottle/bundle/sfx/;
        try_files $uri @spb_app;
        expires 7d;
        access_log off;
    }

    location @spb_app {
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        limit_req zone=spb_general burst=200 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
