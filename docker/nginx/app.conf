limit_req_zone $binary_remote_addr zone=spb_general:10m rate=25r/s;
limit_req_zone $binary_remote_addr zone=spb_auth:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=spb_conn:10m;

upstream spinthebottle_app {
    server bot:8000;
}

server {
    listen 80 default_server;
    server_name spinthebottletg.com www.spinthebottletg.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }


# ── HTTPS: Let's Encrypt ───────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    server_name spinthebottletg.com www.spinthebottletg.com;

    ssl_certificate /etc/letsencrypt/live/spinthebottletg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spinthebottletg.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 32m;
    limit_conn spb_conn 60;

    location /api/auth/ {
        limit_req zone=spb_auth burst=15 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        limit_req zone=spb_general burst=80 nodelay;
        proxy_pass http://spinthebottle_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
