# SpinTheBottle — Docker Compose
# Domen: https://spinthebottletg.com
#
#   cp .env.example .env   # BOT_TOKEN, SECRET_KEY, POSTGRES_PASSWORD, ...
#   docker compose up -d --build
#
# Saytlar `bot` konteynerida (FastAPI static) — nginx :80 orqali:
#   /              login
#   /index         o'yin (Mini App)
#   /welcome       lobi
#   /admin         admin panel
#   /server.json   WS/API URL (joriy domen)
#
# Lokal test (nginx siz, to'g'ridan :8000):
#   docker compose up -d --build bot postgres redis api nginx-files
#   # bot ports qatorini oching (quyida) → http://localhost:8000/

name: spinthebottle

services:
  redis:
    image: redis:7-alpine
    container_name: spinthebottle-redis
    restart: unless-stopped
    networks:
      - app
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:14-alpine
    container_name: spinthebottle-postgres
    env_file:
      - ./.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: aiogram/telegram-bot-api:latest
    container_name: spinthebottle-tg-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
      TELEGRAM_MAX_FILE_SIZE: 2000
    command: ["--max-file-size=2000", "--local"]
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - app

  nginx-files:
    image: nginx:alpine
    container_name: spinthebottle-tgfiles
    restart: unless-stopped
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api:ro
      - ./docker/nginx/tgfiles.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    depends_on:
      - api

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: spinthebottle-bot:latest
    container_name: spinthebottle-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      TELEGRAM_LOCAL: "true"
      TG_API_SERVER_URL: http://api:8081
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-https://spinthebottletg.com}
    stop_signal: SIGINT
    expose:
      - "8000"
    # Lokal dev (nginx siz): ports qatorini oching
    # ports:
    #   - "8000:8000"
    networks:
      - app
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - app-cache:/app/.cache
      # Lokal dev: kod mount (productionda yoqing)
      # - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/favicon.ico', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: spinthebottle-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - app
    depends_on:
      bot:
        condition: service_healthy

networks:
  app:
    driver: bridge

volumes:
  pgdata:
  redis-data:
  telegram-bot-api-data:
  app-cache:
