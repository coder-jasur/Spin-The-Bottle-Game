  <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ban | Spin The Bottle</title>
  <link rel="icon" type="image/png" href="./favicon/favicon-96x96.png" />
  <link rel="stylesheet" href="/static/site_page.css?v=1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1 data-i18n="ban.title"></h1>
    <p data-i18n="ban.desc"></p>

    <div class="info-grid">
      <div class="info-item">
        <span class="label" data-i18n="ban.status_label"></span>
        <span class="value danger" data-i18n="ban.status_value"></span>
      </div>
      <div class="info-item">
        <span class="label" data-i18n="ban.expires_label"></span>
        <span class="value" id="expires-at" data-i18n="ban.expires_loading"></span>
      </div>
    </div>

    <div class="actions">
      <a id="btn-appeal" class="btn-primary" href="https://t.me/SpinTheBottleSupport" target="_blank" rel="noopener noreferrer">
        <span>✈️</span>
        <span data-i18n="ban.btn_appeal"></span>
      </a>
      <a id="btn-home" class="btn-secondary" href="/" data-i18n="ban.btn_home"></a>
    </div>
    <p class="hint" data-i18n="ban.footer"></p>
  </div>
  <script src="/static/site_i18n.js?v=3"></script>
  <script>
    (function () {
      var i18n = SiteI18n.applySiteI18n("ban");
      var params = new URLSearchParams(location.search);
      var supportUser = (params.get("user") || "SpinTheBottleSupport").replace(/^@/, "");
      document.getElementById("btn-appeal").href = "https://t.me/" + supportUser;

      var expiresAt = params.get("expires_at") || "";
      var el = document.getElementById("expires-at");
      var foreverKeys = ["umrbod", "навсегда", "permanent", "ömürlük", "мәңгі", "ҳамеша"];
      var low = expiresAt.toLowerCase();
      if (!expiresAt) {
        el.textContent = i18n.t("ban.expires_unknown");
      } else if (foreverKeys.indexOf(low) >= 0) {
        el.textContent = i18n.t("ban.expires_forever");
      } else {
        el.textContent = expiresAt;
      }
    })();
  </script>
</body>
</html>
