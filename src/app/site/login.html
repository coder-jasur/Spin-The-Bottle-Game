    <style>
        #app-loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0c;
            z-index: 9999;
            transition: opacity .35s ease
        }

        #app-loader.hidden {
            opacity: 0;
            pointer-events: none
        }

        .loader-wrap {
            text-align: center;
            color: #fff;
            font-family: Poppins, sans-serif
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 12px auto 0
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .brand {
            width: 64px;
            height: 64px;
            object-fit: contain;
            display: block;
            margin: 0 auto 8px
        }

        .hint {
            opacity: .7;
            font-size: 12px;
            margin-top: 8px
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js?59"></script>

<body>
    <noscript>JavaScript must be enabled to play games.</noscript>
    <div id="app-loader" aria-label="Loading">
        <div class="loader-wrap">
            <div class="spinner"></div>
            <div class="hint">Loading...</div>
        </div>
    </div>
    <div id="root"></div>
    <div id="chat-root"></div>
    <script>
        window.__gamollaHideLoader = function () {
            const e = document.getElementById("app-loader");
            e && (e.classList.add("hidden"),
                setTimeout((() => e.parentNode && e.parentNode.removeChild(e)), 400))
        };

        (function () {
                function loadLobbyBundle() {
                    var s = document.createElement("script");
                    s.defer = true;
                    s.src = "./static/js/main.be3d9225.js?v=8";
                    document.head.appendChild(s);
                }
                function autoLoginTG() {
                    var hint = document.querySelector(".hint");
                    function go(url) {
                        if (hint) hint.textContent = "O'yinga kirilmoqda...";
                        window.TgAutoAuth.goToGame(url);
                    }
                    if (!window.TgAutoAuth) {
                        loadLobbyBundle();
                        return;
                    }
                    var inTg = !!(window.Telegram && window.Telegram.WebApp);
                    var forceTg = inTg && !window.TgAutoAuth.hasGameSessionInUrl();
                    if (window.TgAutoAuth.hasAuthToken() && !forceTg) {
                        if (hint) hint.textContent = "Kirish...";
                        window.TgAutoAuth.fetchGameEntryUrl().then(function (url) {
                            if (url) go(url);
                            else window.TgAutoAuth.run({ forceTelegram: inTg }).then(function (r) {
                                if (r.ok) go(r.redirectUrl);
                            });
                        });
                        return;
                    }
                    if (hint) hint.textContent = "Avtorizatsiya...";
                    window.TgAutoAuth.run({ forceTelegram: forceTg }).then(function (res) {
                        if (res && res.ok && res.redirectUrl) {
                            go(res.redirectUrl);
                            return;
                        }
                        if (hint) hint.textContent = "Loading...";
                        loadLobbyBundle();
                    });
                }
                if (document.readyState === "loading") {
                    document.addEventListener("DOMContentLoaded", autoLoginTG);
                } else {
                    autoLoginTG();
                }
            })();
    </script>
