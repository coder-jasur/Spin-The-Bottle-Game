    <style>
        #app-loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0c;
            z-index: 9999;
            transition: opacity .35s ease
        }

        #app-loader.hidden {
            opacity: 0;
            pointer-events: none
        }

        .loader-wrap {
            text-align: center;
            color: #fff;
            font-family: Poppins, sans-serif
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 12px auto 0
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .brand {
            width: 64px;
            height: 64px;
            object-fit: contain;
            display: block;
            margin: 0 auto 8px
        }

        .hint {
            opacity: .7;
            font-size: 12px;
            margin-top: 8px
        }

        /* Balance menyusidagi ulkan yulduzchani kichraytirish */
        .GM-balance img,
        .STARS-balance img,
        .balance-indicator img {
            height: 18px !important;
            width: 18px !important;
            max-width: 18px !important;
            max-height: 18px !important;
            object-fit: contain !important;
            vertical-align: middle !important;
            margin-right: 3px !important;
            display: inline-block !important;
        }

        /* Balans orqasidagi shaffof oqish box (Glassmorphism) */
        .GM-balance,
        .STARS-balance,
        .balance-indicator,
        .profile-balance,
        .store-balance {
            background: rgba(255, 255, 255, 0.07) !important;
            backdrop-filter: blur(8px) !important;
            -webkit-backdrop-filter: blur(8px) !important;
            border: 0.5px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 10px !important;
            padding: 3px 10px !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 4px !important;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.2) !important;
            font-weight: 700 !important;
            font-size: 13px !important;
            color: #fff !important;
            transition: all 0.2s ease !important;
            min-height: 28px !important;
        }

        .GM-balance:hover,
        .STARS-balance:hover,
        .balance-indicator:hover {
            background: rgba(255, 255, 255, 0.15) !important;
            border-color: rgba(255, 255, 255, 0.3) !important;
            transform: translateY(-1px) !important;
        }

        .admin-fixed-btn {
            background: linear-gradient(180deg, #f2b37b, #e29a5f);
            border: none;
            border-radius: 999px;
            bottom: 16px;
            box-shadow: 0 12px 30px #00000059;
            color: #1a120e;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            outline: none;
            padding: 11px 16px;
            position: fixed;
            left: 16px;
            z-index: 9999;
            text-decoration: none;
            display: none;
            /* Initially hidden */
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-family: Poppins, sans-serif;
        }

        .admin-fixed-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 35px #0000007a;
            background: linear-gradient(180deg, #ffc48c, #f2a96f);
        }

        .game-ticket-button, .mole-ticket-button, .buy-ticket-button,
        .percent-bonus, [class*="percent-bonus"], .percent-bonus__image-ticket,
        .tickets, [class*="tickets_x_popup"], [class*="tickets__"] {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
            opacity: 0 !important;
        }

        .license-fixed-btn,
        .license-popup-backdrop {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
    <script>
        (function () {
            function checkAdmin() {
                fetch('/api/admin/check')
                    .then(res => res.json())
                    .then(data => {
                        if (data.is_admin && !document.querySelector('.admin-fixed-btn')) {
                            const btn = document.createElement('a');
                            btn.href = '/admin';
                            btn.className = 'admin-fixed-btn';
                            btn.innerHTML = '🛡️';
                            btn.style.display = 'flex';
                            document.body.appendChild(btn);
                        }
                    })
                    .catch(e => console.error('Admin check failed:', e));
            }
            // Check admin status on load
            window.addEventListener('DOMContentLoaded', checkAdmin);
            // Also check periodically in case of dynamic UI updates or re-renders
            setTimeout(checkAdmin, 2000);
        })();
    </script>

        window.__gamollaHideLoader = function () {

    <script>
        // Logout tugmasi uchun VANILLA JS (jQuery shart emas)
        document.addEventListener('click', function (e) {
            if (e.target && (e.target.classList.contains('logout-button') || e.target.closest('.logout-button'))) {
                console.log(">>> Logging out (Vanilla JS)...");

                const token = localStorage.getItem('accessToken');

                // 1. JavaScript orqali cookielarni ham o'chirib tashlaymiz (backup)
                const cookies = document.cookie.split(";");
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i];
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
                    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
                }

                // 2. Serverga xabar berish
                fetch('/api/auth/logout', {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                }).finally(() => {
                    // 3. Tozalash va redirect
                    localStorage.clear();
                    sessionStorage.clear();
                    window.location.href = '/';
                });
            }
        });
    </script>
