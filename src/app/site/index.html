  <script>
    (function () {
      var statusEl = document.getElementById("boot-status");
      var loaderEl = document.getElementById("app-boot-loader");
      function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
      function hideLoader() {
        if (loaderEl) loaderEl.style.display = "none";
      }
      function goGame(redirectUrl) {
        if (window.TgAutoAuth && window.TgAutoAuth.goToGame(redirectUrl)) {
          return true;
        }
        if (redirectUrl) {
          var t = redirectUrl.charAt(0) === "/" ? location.origin + redirectUrl : redirectUrl;
          location.replace(t);
          return true;
        }
        return false;
      }
      function loadGameBundle() {
        setStatus("O'yin yuklanmoqda...");
        var s = document.createElement("script");
        s.type = "module";
        s.crossOrigin = "anonymous";
        s.src = "./assets/index-1776688741387-BUz5E6og.js?v=67";
        s.onload = function () { setTimeout(hideLoader, 1500); };
        s.onerror = function () { setStatus("JS yuklanmadi. Serverni qayta ishga tushiring."); };
        document.head.appendChild(s);
      }
      function hasGameSessionInUrl() {
        return /[?&]user_id=/.test(location.search || "");
      }
      function bootGame() {
        try {
          if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
          }
        } catch (e) { /* ignore */ }

        if (hasGameSessionInUrl()) {
          loadGameBundle();
          return;
        }
        setStatus("Telegram orqali kirish...");
        var forceTg = !!(window.Telegram && window.Telegram.WebApp);
        window.TgAutoAuth.run({ forceTelegram: forceTg }).then(function (res) {
          if (res && res.ok && res.redirectUrl) {
            goGame(res.redirectUrl);
            return;
          }
          var tgUser = window.Telegram && window.Telegram.WebApp &&
            window.Telegram.WebApp.initDataUnsafe &&
            window.Telegram.WebApp.initDataUnsafe.user;
          if (tgUser) {
            setStatus("Kirish xatosi. Qayta urinib ko'ring.");
          } else {
            setStatus("Ilovani Telegram orqali oching.");
          }
        });
      }
      bootGame();
    })();
  </script>

  <div id="ref-toast" class="ref-toast"></div>

  <script>
    (function() {
      document.addEventListener('click', function (e) {
          const logoutBtn = e.target.closest('.logout-button');
          if (logoutBtn) {
              const token = localStorage.getItem('accessToken');
              fetch('/api/auth/logout', {
                  method: 'GET',
                  headers: { 'Authorization': 'Bearer ' + token }
              }).finally(() => {
                  localStorage.clear();
                  sessionStorage.clear();
                  window.location.href = '/';
              });
          }
      });

      const BOT_URL = 'https://t.me/SpinbottleTgBot/spin_bottle';
      let referralId = null;

      function showToast(msg) {
          const t = document.getElementById('ref-toast');
          if (!t) return;
          t.textContent = msg;
          t.classList.add('show');
          setTimeout(() => t.classList.remove('show'), 3000);
      }

      function fetchReferralData() {
          const token = localStorage.getItem('accessToken');
          fetch('/frames/referrals', {
              headers: { 'Authorization': `Bearer ${token}` }
          })
          .then(r => r.json())
          .then(data => {
              if (data.success) referralId = data.referral_id;
          });
      }

      function shareReferral() {
          if (!referralId) {
              showToast("Havola yuklanmoqda...");
              fetchReferralData();
              return;
          }
          const shareUrl = `${BOT_URL}?startapp=${referralId}`;
          const shareText = "Please help me get a free airdrop up to $1 worth.\nYou just need to collect 50 kisses in this game on Telegram.";
          if (window.Telegram && window.Telegram.WebApp) {
              const tgUrl = `https://t.me/share/url?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(shareText)}`;
              window.Telegram.WebApp.openTelegramLink(tgUrl);
          } else {
              navigator.clipboard.writeText(shareUrl).then(() => showToast("Havola nusxalandi!"));
          }
      }

      document.body.addEventListener('click', (e) => {
          const inviteBtn = e.target.closest('.settings__item--selectable');
          if (inviteBtn && inviteBtn.querySelector('.settings__icon--invite')) {
              e.preventDefault();
              e.stopPropagation();
              shareReferral();
          }
      });

      setTimeout(fetchReferralData, 3000);
    })();
  </script>

  <script id="stars-observer">
    (function () {
      const targetImg = '/images/stars.png';
      function replaceStars() {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        const nodesToReplace = [];
        while (node = walker.nextNode()) {
          if (node.nodeValue.includes('STARS') && !node.parentElement.closest('.stars-replaced')) {
            nodesToReplace.push(node);
          }
        }
        nodesToReplace.forEach(textNode => {
          const parent = textNode.parentNode;
          if (parent && !parent.classList.contains('stars-replaced')) {
            const span = document.createElement('span');
            span.className = 'stars-replaced';
            span.style.display = 'inline-flex';
            span.style.alignItems = 'center';
            span.style.verticalAlign = 'middle';
            const parts = textNode.nodeValue.split('STARS');
            parts.forEach((part, index) => {
              span.appendChild(document.createTextNode(part));
              if (index < parts.length - 1) {
                const img = document.createElement('img');
                img.src = targetImg;
                img.className = 'stars-icon';
                img.style.cssText = 'height:18px !important; width:18px !important; display:inline-block !important; vertical-align:middle !important;';
                img.width = 18;
                img.height = 18;
                img.alt = '★';
                span.appendChild(img);
              }
            });
            parent.replaceChild(span, textNode);
          }
        });
      }
      const observer = new MutationObserver(() => replaceStars());
      observer.observe(document.body, { childList: true, subtree: true });
      replaceStars();
    })();
    (function () {
      var hideSel = ".percent-bonus,[class*='percent-bonus'],.percent-bonus__image-ticket,.tickets,[class*='tickets_x_popup'],[class*='tickets__'],.reward__item--ticket";
      function hideTicketPromo() {
        document.querySelectorAll(hideSel).forEach(function (el) {
          el.style.setProperty("display", "none", "important");
          el.style.setProperty("visibility", "hidden", "important");
          el.style.setProperty("pointer-events", "none", "important");
          el.style.setProperty("opacity", "0", "important");
        });
      }
      hideTicketPromo();
      new MutationObserver(hideTicketPromo).observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
