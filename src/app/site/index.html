  <style>
    .stars-icon,

  <script id="stars-observer">
    (function () {
      const targetImg = '/images/stars.png';
      function replaceStars() {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        let node;
        const nodesToReplace = [];
        while (node = walker.nextNode()) {
          if (node.nodeValue.includes('STARS') && !node.parentElement.closest('.stars-replaced')) {
            nodesToReplace.push(node);
          }
        }
        nodesToReplace.forEach(textNode => {
          const parent = textNode.parentNode;
          if (parent && !parent.classList.contains('stars-replaced')) {
            const span = document.createElement('span');
            span.className = 'stars-replaced';
            span.style.display = 'inline-flex';
            span.style.alignItems = 'center';
            span.style.verticalAlign = 'middle';

            const parts = textNode.nodeValue.split('STARS');
            parts.forEach((part, index) => {
              span.appendChild(document.createTextNode(part));
              if (index < parts.length - 1) {
                const img = document.createElement('img');
                img.src = targetImg;
                img.className = 'stars-icon';
                img.style.cssText = 'height:18px !important; width:18px !important; display:inline-block !important; vertical-align:middle !important;';
                img.width = 18;
                img.height = 18;
                img.alt = '★';
                span.appendChild(img);
              }
            });
            parent.replaceChild(span, textNode);
          }
        });
      }
      const observer = new MutationObserver((mutations) => {
        replaceStars();
      });
      observer.observe(document.body, { childList: true, subtree: true });
      replaceStars();
    })();
  </script>
